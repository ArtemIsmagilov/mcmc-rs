name: CI

on: [pull_request, push]

jobs:
  test:
    runs-on: "ubuntu-latest"
    name: Run tests.
    steps:
      - name: Checkout Source
        uses: actions/checkout@v6
      - name: Run servers
        run: |
          docker compose up -d
          bash chmod_unix.bash
      - name: Run tests
        run: |
          cargo test

  coverage:
    runs-on: "ubuntu-latest"
    name: Run tests coverage.
    steps:
      - name: Checkout Source
        uses: actions/checkout@v6
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run servers
        run: |
          docker compose up -d
          bash chmod_unix.bash
      - name: Run tests coverage
        run: |
          cargo llvm-cov --doctests

  bench:
    runs-on: "ubuntu-latest"
    name: Run benchmark.
    steps:
      - name: Checkout Source
        uses: actions/checkout@v6
      - name: Run servers
        run: |
          docker compose up -d
          bash chmod_unix.bash
      - name: Run benchmark
        run: |
          cargo bench

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Analyze code
        uses: iepathos/debtmap-action@v1
      - name: View Report
        run: |
          cat debtmap-report.md

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Check formatting
        run: cargo fmt --all -- --check
